<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viralify Landing Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .loading, .error { display: none; color: red; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 15px; }
        .demo-output { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Viralify</h1>
        <input type="text" id="inputField" placeholder="Enter something..." />
        <button id="generateButton">Generate</button>
        <div class="loading">Loading...</div>
        <div class="error"></div>
        <div class="demo-output"></div>
    </div>
    <script>
        const inputField = document.getElementById('inputField');
        const generateButton = document.getElementById('generateButton');
        const loadingMessage = document.querySelector('.loading');
        const errorMessage = document.querySelector('.error');
        const demoOutput = document.querySelector('.demo-output');

        // API Key from environment variable
        const API_KEY = process.env.API_KEY;

        const generateOutput = async () => {
            const inputValue = inputField.value.trim();
            errorMessage.textContent = '';
            demoOutput.textContent = '';
            if (inputValue === '') {
                errorMessage.textContent = 'Please enter a value.';
                return;
            }

            loadingMessage.style.display = 'block';
            try {
                // Simulating API call 
                const response = await fetch(`https://api.example.com/generate?input=${encodeURIComponent(inputValue)}&key=${API_KEY}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                demoOutput.textContent = data.result;
            } catch (error) {
                errorMessage.textContent = 'Error: ' + error.message;
            } finally {
                loadingMessage.style.display = 'none';
            }
        };

        generateButton.addEventListener('click', generateOutput);

        // Keyboard shortcut: Enter key
        inputField.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                generateOutput();
            }
        });

        // Local storage for preferences
        const savedValue = localStorage.getItem('inputValue');
        if (savedValue) {
            inputField.value = savedValue;
        }

        // Save input to localStorage
        inputField.addEventListener('change', () => {
            localStorage.setItem('inputValue', inputField.value);
        });
    </script>
</body>
</html>
